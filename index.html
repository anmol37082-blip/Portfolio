<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lead Form</title>
    <!-- Client ID: anmolsingh123 -->
  </head>
  <body>
    <form id="lead-form">
      <label>
        Name
        <input name="name" type="text" placeholder="Jane Doe" />
      </label>
      <label>
        Email
        <input name="email" type="email" placeholder="jane@example.com" />
      </label>
      <label>
        Phone
        <input name="phone" type="tel" placeholder="+91 98765 43210" />
      </label>
      <button type="submit">Submit</button>
    </form>
    <p id="lead-status" aria-live="polite"></p>
    <script>
      const endpoint = 'https://saasprojrct.vercel.app/api/leads';
      const apiKey = 'peepGkRFYExfJnVJJ6OhXmHJeULaAjeC3_QYNHXmyqo';
      const form = document.getElementById('lead-form');
      const status = document.getElementById('lead-status');

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        status.textContent = 'Submitting...';

        try {
          const payload = Object.fromEntries(new FormData(form).entries());
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Api-Key': apiKey
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const message = await response.text();
            throw new Error(message || 'Failed to submit lead');
          }

          form.reset();
          status.textContent = 'Lead submitted successfully.';
        } catch (error) {
          status.textContent = error instanceof Error ? error.message : 'Failed to submit lead';
        }
      });
    </script>
  </body>
</html>
